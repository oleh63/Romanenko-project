<!doctype html>
<html lang="uk">

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="Romanenko Accessories — весільні прикраси ручної роботи. Унікальні сережки, гілочки, обручі та аксесуари для наречених."

      property="og:description"

  <body>
    {{> header }} {{> mob-menu }}
    <main>
      {{> hero }} {{> catalog }} {{> about-me }} {{> mission }} {{> instagram }}
      {{> reviews }}

    {{> footer}} {{> catalog-modal }} {{> lightbox }}

    <script type="module" src="/src/main.js" defer></script>
